<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Article preview component</title>

  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main class="main-card">
    <article class="card-wrapper">
      <section class="container">
        <div class="right">
          <img src="./images/drawers.jpg" alt="">
        </div>

        <div class="left">
          <div class="content">
            <h1>Shift the overall look and feel by adding these wonderful 
            touches to furniture in your home</h1>

            <p>Ever been in a room and felt like something was missing? Perhaps 
              it felt slightly bare and uninviting. I’ve got some simple tips 
              to help you make any room feel complete.
            </p>

            <div class="button-container">
              <figure class="person-info">
                <img src="./images/avatar-michelle.jpg" alt="Michelle Appleton — author avatar">

                <figcaption class="person-text">
                  <span class="name">Michelle Appleton</span>
                  <time class="date" datetime="2020-06-28">28 Jun 2020</time>
                </figcaption>
              </figure>

              <!-- 
              Alternative - Syntax:

                <div class="author-block">
                  <img src="./images/avatar-michelle.jpg" alt="Michelle Appleton — author avatar">
                  <address class="author-info"> address indicates person/organization responsible
                    Michelle Appleton
                    <time datetime="2020-06-28">28 Jun 2020</time>
                  </address>
                </div>
              
              -->
              <button type="button" class="share" aria-label="Share article">
                <img src="./images/icon-share.svg" alt="">
              </button>
            </div>
          </div>
        </div>
      </section>
      
      <section class="popover" role="dialog">
        <!-- role="dialog" = “This is an interactive popup -->

        <!-- 
          Another option:

          <div class="popover" aria-hidden="true">

          Then in JS:

          popOver.setAttribute("aria-hidden", !isOpen);
        -->
        <div class="popover-content">
          <p>SHARE</p>

          <div class="popover-social-media">
            <a href="#" aria-label="Share on Facebook"><img src="./images/icon-facebook.svg" alt=""></a>
            <a href="#" aria-label="Share on Twitter"><img src="./images/icon-twitter.svg" alt=""></a>
            <a href="#" aria-label="Share on Pinterest"><img src="./images/icon-pinterest.svg" alt=""></a>
          </div>

          <button type="button" class="share share-inside" aria-label="Cloose share menu">
            <img src="./images/icon-share.svg" alt="">
          </button>
        </div>
      </section>
    </article>
  </main>
  
  <script src="script.js"></script>
</body>
</html>
